# Example Configuration for MongoDB Microservice

# MongoDB Connection
spring.data.mongodb.uri=mongodb://localhost:27017/inventory_db

# ActiveMQ
spring.activemq.broker-url=tcp://localhost:61616

# Event Publisher Configuration
event.publisher.database-type=MONGODB
event.publisher.outbox-table=outbox_events
event.publisher.status-column=status

# Queue Mappings (customize per service)
event.publisher.queue-mapping.InventoryUpdated=inventory-to-order-queue
event.publisher.queue-mapping.StockAllocated=stock-allocated-queue

# Optional: Override defaults
# event.publisher.polling-interval-ms=1000
# event.publisher.batch-size=1
# event.publisher.max-retries=5
# event.publisher.retry.max-attempts=5
# event.publisher.retry.backoff-ms=1000
# event.publisher.circuit-breaker.failure-threshold=50
# event.publisher.circuit-breaker.wait-duration-seconds=30
