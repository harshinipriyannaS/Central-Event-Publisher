# Example Configuration for PostgreSQL Microservice

# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/order_db
spring.datasource.username=postgres
spring.datasource.password=Harshini@258
spring.datasource.driver-class-name=org.postgresql.Driver

# ActiveMQ
spring.activemq.broker-url=tcp://localhost:62626

# Event Publisher Configuration
event.publisher.database-type=JDBC
event.publisher.outbox-table=outbox_events
event.publisher.status-column=status

# Queue Mappings (customize per service)
event.publisher.queue-mapping.OrderCreated=order-to-notification-queue
event.publisher.queue-mapping.OrderUpdated=order-updated-queue

# Optional: Override defaults
# event.publisher.polling-interval-ms=1000
# event.publisher.batch-size=1
# event.publisher.max-retries=5
# event.publisher.retry.max-attempts=5
# event.publisher.retry.backoff-ms=1000
# event.publisher.circuit-breaker.failure-threshold=50
# event.publisher.circuit-breaker.wait-duration-seconds=30
