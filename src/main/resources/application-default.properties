# Default configuration embedded in JAR
# These can be overridden in microservice's application.properties

# Polling configuration (common defaults)
event.publisher.polling-interval-ms=1000
event.publisher.batch-size=1

# Retry configuration (common defaults)
event.publisher.retry.max-attempts=5
event.publisher.retry.backoff-ms=1000

# Circuit Breaker configuration (common defaults)
event.publisher.circuit-breaker.failure-threshold=50
event.publisher.circuit-breaker.wait-duration-seconds=30

# Enable/disable publisher
event.publisher.enabled=true
